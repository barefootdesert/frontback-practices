<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика 1 — CSS-препроцессоры</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://ir.ozone.ru/s3/multimedia-a/c1000/6855937930.jpg" alt="Deadwing LP">
        
        <div class="product-card__content">
            <h2 class="product-card__title">Porcupine Tree - Deadwing</h2>
            <p class="product-card__description">
                Прекрасный прогрессив-рок/метал альбом 2005 года на виниле!.
            </p>
            
            <div class="product-card__price">5 990 ₽</div>
            
            <button class="product-card__button">Добавить в корзину</button>
        </div>
    </div>

</body>
</html>
